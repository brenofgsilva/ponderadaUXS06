<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa do Brasil com D3.js</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap");

      :root {
        color-scheme: light;
        --bg: #f7f1e8;
        --panel: rgba(255, 251, 245, 0.82);
        --panel-border: rgba(104, 79, 52, 0.14);
        --text: #1d1b18;
        --muted: #61584b;
        --accent: #0d6b6b;
        --accent-soft: #dcefe8;
        --shadow: 0 18px 50px rgba(70, 52, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top left,
            rgba(13, 107, 107, 0.18),
            transparent 26%
          ),
          radial-gradient(
            circle at right 18%,
            rgba(196, 130, 38, 0.18),
            transparent 20%
          ),
          linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 48px;
      }

      .hero {
        display: grid;
        gap: 12px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-family: "Playfair Display", serif;
        font-size: clamp(2.2rem, 4vw, 4.2rem);
        line-height: 0.96;
        max-width: 10ch;
      }

      .hero p {
        margin: 0;
        max-width: 62ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .map-shell {
        position: relative;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        padding: 20px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }

      .map-shell::before {
        content: "";
        position: absolute;
        inset: auto -10% -35% auto;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(13, 107, 107, 0.16),
          transparent 70%
        );
        pointer-events: none;
      }

      .map-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: baseline;
        margin-bottom: 16px;
      }

      .map-header h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      .status {
        margin: 0;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .map-frame {
        position: relative;
        min-height: 560px;
        border-radius: 20px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.55),
            rgba(232, 244, 240, 0.7)
          ),
          repeating-linear-gradient(
            135deg,
            rgba(13, 107, 107, 0.03),
            rgba(13, 107, 107, 0.03) 16px,
            transparent 16px,
            transparent 32px
          );
        overflow: hidden;
      }

      #map {
        display: block;
        width: 100%;
        height: 100%;
      }

      .tooltip {
        position: absolute;
        top: 0;
        left: 0;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(29, 27, 24, 0.92);
        color: #fffdf9;
        font-size: 0.92rem;
        pointer-events: none;
        opacity: 0;
        transform: translate(-50%, calc(-100% - 12px));
        transition: opacity 140ms ease;
        white-space: nowrap;
      }

      .legend {
        margin: 16px 0 0;
        font-size: 0.92rem;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 20px, 1120px);
          padding-top: 24px;
        }

        .map-shell {
          padding: 16px;
          border-radius: 22px;
        }

        .map-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .map-frame {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Projeto inicial</p>
        <h1>Mapa do Brasil com D3.js</h1>
        <p>
          Esta base carrega um GeoJSON público dos estados brasileiros, desenha
          o mapa em SVG e ajusta o layout automaticamente conforme o tamanho da
          tela.
        </p>
      </section>

      <section class="map-shell" aria-labelledby="map-title">
        <div class="map-header">
          <h2 id="map-title">Estados brasileiros</h2>
          <p class="status" id="status">Carregando dados geográficos...</p>
        </div>

        <div class="map-frame">
          <svg
            id="map"
            role="img"
            aria-label="Mapa do Brasil com os estados"
          ></svg>
          <div class="tooltip" id="tooltip" aria-hidden="true"></div>
        </div>

        <p class="legend">Passe o cursor sobre um estado para ver o nome.</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="./script.js"></script>
  </body>
</html>
