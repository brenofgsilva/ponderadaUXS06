<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bases Parceiro — Suzano</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js">
// ── SIMULAÇÃO DE OCORRÊNCIA ──────────────────────────────────────────────────
const VEL = { aviao: 250, helicoptero: 160, caminhao: 70 };
const EMO = { aviao: '✈', helicoptero: '🚁', caminhao: '🚛' };
const EMO_LABEL = { aviao: 'Avião', helicoptero: 'Helicóptero', caminhao: 'Caminhão' };
const COR_RECURSO = { aviao: '#005a8e', helicoptero: '#c8372d', caminhao: '#e87722' };

let simAtiva = false;
let simTimers = [];
let fireUPsAtivos = [];

function haversineKm(lon1, lat1, lon2, lat2) {
  const R = 6371, toR = Math.PI/180;
  const dLat = (lat2-lat1)*toR, dLon = (lon2-lon1)*toR;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function showNotif(titulo, sub, tipo='fire') {
  const n = document.getElementById('notificacao');
  n.className = 'notificacao ' + tipo;
  n.querySelector('.notif-title').textContent = titulo;
  n.querySelector('.notif-sub').textContent   = sub;
  n.classList.add('visible');
  setTimeout(() => n.classList.remove('visible'), 3500);
}

function atualizarPainel(dispatches) {
  const panel = document.getElementById('ocorrencia-panel');
  const content = document.getElementById('oc-content');
  if (!dispatches || dispatches.length === 0) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');
  content.innerHTML = dispatches.map(d =>
    `<div class="oc-row"><span>${EMO[d.tipo]} ${EMO_LABEL[d.tipo]}</span><span id="eta-${d.id}">ETA ${d.eta}min</span></div>`
  ).join('') +
  `<div class="oc-row" style="margin-top:6px"><span>UPs afetadas</span><span>${fireUPsAtivos.length}</span></div>`;
}

function iniciarSimulacao() {
  simAtiva = true;
  const btn = document.getElementById('btn-play');
  btn.textContent = '■';
  btn.classList.add('active');

  showNotif('🔥 NOVA OCORRÊNCIA INICIADA', 'Incêndio detectado — despachando recursos');

  // Selecionar 3-5 UPs aleatórias visíveis
  const candidates = data.filter(d => activeNucleos.has(d.nucleo));
  const shuffled = [...candidates].sort(() => Math.random() - 0.5);
  fireUPsAtivos = shuffled.slice(0, 3 + Math.floor(Math.random() * 3));

  // Grupo do fogo
  const fireGrp = gMain.append('g').attr('class', 'fire-group');

  fireUPsAtivos.forEach(up => {
    const cx = xScale(up.lon), cy = yScale(up.lat);
    const r  = rScale(up.area);

    // Ondas de pulso em camadas
    [0, 400, 800].forEach(delay => {
      const ring = fireGrp.append('circle')
        .attr('cx', cx).attr('cy', cy).attr('r', r + 2)
        .attr('fill', 'none').attr('stroke', '#c8372d')
        .attr('stroke-width', 1.5).attr('opacity', 0.9);
      function pulsarRing() {
        ring.interrupt();
        ring.attr('r', r+2).attr('opacity', 0.9)
          .transition().delay(delay % 400).duration(1000)
          .attr('r', r + 22).attr('opacity', 0)
          .on('end', () => { if(simAtiva) pulsarRing(); });
      }
      pulsarRing();
    });

    // Círculo vermelho sólido sobre a UP
    fireGrp.append('circle')
      .attr('class', 'fire-dot-' + up.up)
      .attr('cx', cx).attr('cy', cy).attr('r', r)
      .attr('fill', '#c8372d').attr('opacity', 0.92)
      .attr('stroke', '#fff').attr('stroke-width', 1);

    // Emoji fogo
    fireGrp.append('text')
      .attr('x', cx).attr('y', cy - r - 5)
      .attr('text-anchor','middle').attr('font-size','13px')
      .attr('pointer-events','none').text('🔥');
  });

  // Despachar recursos após 2s
  const dispatchList = [];
  let dispId = 0;

  setTimeout(() => {
    const dispGrp = gMain.append('g').attr('class', 'dispatch-group');

    fireUPsAtivos.forEach((up, fi) => {
      // Escolher base mais próxima com recurso disponível
      const tipos = ['aviao','helicoptero','caminhao'];
      const numR = 1 + (fi % 2); // 1 ou 2 recursos por UP

      for (let ri = 0; ri < numR; ri++) {
        const tipo = tipos[(fi + ri) % tipos.length];
        const basesComTipo = basesData.filter(b => b[tipo] > 0);
        if (!basesComTipo.length) continue;

        // Base mais próxima
        const base = basesComTipo.reduce((best, b) => {
          const d = haversineKm(b.lon, b.lat, up.lon, up.lat);
          return d < best.dist ? {b, dist:d} : best;
        }, {b: basesComTipo[0], dist:Infinity}).b;

        const distKm = haversineKm(base.lon, base.lat, up.lon, up.lat);
        const etaMin = Math.max(1, Math.round(distKm / VEL[tipo] * 60));
        const durMs  = 22000 + ri * 3000 + fi * 1500; // duração visual

        const id = dispId++;
        dispatchList.push({ id, tipo, eta: etaMin, base: base.up, alvo: up.up });
        atualizarPainel(dispatchList);

        animarRecurso(dispGrp, base, up, tipo, id, etaMin, durMs, dispatchList);
      }
    });
  }, 2000);
}

function animarRecurso(grp, base, upAlvo, tipo, id, etaMin, durMs, dispList) {
  const x1 = xScale(base.lon), y1 = yScale(base.lat);
  const x2 = xScale(upAlvo.lon), y2 = yScale(upAlvo.lat);
  const cor = COR_RECURSO[tipo];

  // Linha tracejada (marching ants)
  const linha = grp.append('line')
    .attr('class', 'dispatch-line')
    .attr('x1', x1).attr('y1', y1)
    .attr('x2', x1).attr('y2', y1)   // começa no ponto de origem
    .attr('stroke', cor)
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '6 6')
    .attr('opacity', 0.7);

  // Animar extensão da linha nos primeiros 20% do tempo
  linha.transition().duration(durMs * 0.2)
    .attr('x2', x2).attr('y2', y2);

  // Grupo do ícone móvel
  const iconGrp = grp.append('g').attr('class', 'recurso-mov').attr('opacity', 0);

  // Emoji ícone
  iconGrp.append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-size','16px').attr('y', 1).attr('filter','drop-shadow(0 1px 2px rgba(0,0,0,0.6))').text(EMO[tipo]);

  // ETA label (acima)
  const etaTxt = iconGrp.append('text')
    .attr('id', 'moving-eta-' + id)
    .attr('text-anchor','middle')
    .attr('font-size','8px').attr('font-weight','700')
    .attr('font-family','Inter,sans-serif')
    .attr('fill', cor).attr('y', -18)
    .text('ETA ' + etaMin + 'min');

  // Velocidade (abaixo)
  iconGrp.append('text')
    .attr('text-anchor','middle')
    .attr('font-size','8px').attr('font-family','Inter,sans-serif')
    .attr('fill','rgba(255,255,255,0.7)').attr('y', 24)
    .text(VEL[tipo] + ' km/h');

  // Animar movimento com d3.timer
  const startTime = performance.now();
  iconGrp.transition().duration(300).attr('opacity', 1);

  const timer = d3.timer(elapsed => {
    const progress = Math.min(elapsed / durMs, 1);
    const cx = x1 + (x2 - x1) * progress;
    const cy = y1 + (y2 - y1) * progress;
    iconGrp.attr('transform', `translate(${cx},${cy})`);

    // Atualizar ETA no ícone e no painel
    const etaAtual = Math.max(0, Math.round(etaMin * (1 - progress)));
    etaTxt.text(etaAtual > 0 ? 'ETA ' + etaAtual + 'min' : 'Chegando...');
    const panelEta = document.getElementById('eta-' + id);
    if (panelEta) panelEta.textContent = etaAtual > 0 ? 'ETA ' + etaAtual + 'min' : '✓ Chegou';

    if (progress >= 1) {
      timer.stop();
      // Flash verde na UP (extinto)
      grp.selectAll('.fire-dot-' + upAlvo.up)
        .transition().duration(200).attr('fill','#8dc63f')
        .transition().delay(800).duration(400).attr('opacity',0).remove();
      // Fade out dos elementos
      iconGrp.transition().duration(600).attr('opacity',0).remove();
      linha.transition().duration(600).attr('opacity',0).remove();

      // Verificar se todos chegaram
      const allDone = dispList.every(d => {
        const el = document.getElementById('eta-' + d.id);
        return !el || el.textContent === '✓ Chegou';
      });
      if (allDone) {
        setTimeout(() => {
          showNotif('✅ OCORRÊNCIA CONTROLADA', 'Todos os recursos chegaram ao destino', 'ok');
          setTimeout(encerrarSimulacao, 3500);
        }, 800);
      }
    }
  });
  simTimers.push(timer);
}

function encerrarSimulacao() {
  simAtiva = false;
  simTimers.forEach(t => t.stop());
  simTimers = [];
  fireUPsAtivos = [];

  d3.selectAll('.fire-group').remove();
  d3.selectAll('.dispatch-group').remove();

  document.getElementById('ocorrencia-panel').classList.remove('visible');

  const btn = document.getElementById('btn-play');
  btn.textContent = '▶';
  btn.classList.remove('active');
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (simAtiva) encerrarSimulacao();
  else iniciarSimulacao();
});

</script>

const data = rows.map(r => ({
  up: r[0], name: r[1], area: r[2],
  nucleo: r[3], lon: r[4], lat: r[5],
  aviao: r[6], caminhao: r[7], helicoptero: r[8]
}));

// Suzano color palette for nucleos
const nucleos = [...new Set(data.map(d => d.nucleo))].sort();
const suzanoPalette = [
  '#00573F', // Suzano dark green
  '#8dc63f', // Suzano light green
  '#005a8e', // deep blue
  '#e87722', // orange
  '#b5bd00', // yellow-green
  '#007a6e', // teal
  '#c8372d', // red
  '#6d2077', // purple
  '#00a0af', // cyan
  '#f0a500', // amber
  '#3a5f0b', // forest
];
const colorMap = {};
nucleos.forEach((n, i) => colorMap[n] = suzanoPalette[i % suzanoPalette.length]);

// Stats
document.getElementById('total-bases').textContent = data.length;
document.getElementById('total-nucleos').textContent = nucleos.length;
const totalArea = data.reduce((s, d) => s + d.area, 0);
document.getElementById('total-area').textContent = (totalArea/1000).toFixed(0)+'k';

// Legend
const legend = document.getElementById('legend');
const nucCounts = {};
data.forEach(d => nucCounts[d.nucleo] = (nucCounts[d.nucleo]||0)+1);
let activeNucleos = new Set(nucleos);

nucleos.forEach(n => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${colorMap[n]}"></span>${n}<span class="legend-count">${nucCounts[n]}</span>`;
  item.addEventListener('click', () => {
    if (activeNucleos.has(n)) {
      if (activeNucleos.size === 1) {
        activeNucleos = new Set(nucleos);
        document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('dimmed'));
      } else {
        activeNucleos.delete(n);
        item.classList.add('dimmed');
      }
    } else {
      activeNucleos.add(n);
      item.classList.remove('dimmed');
    }
    updateVisibility();
  });
  legend.appendChild(item);
});

// Transport filter — agora filtra as BASES de rastreio
let activeTransport = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTransport = btn.dataset.transport;
    updateVisibility();
  });
});

function updateVisibility() {
  // UPs: visibilidade controlada apenas pelo nucleo
  d3.selectAll('.dot').each(function(d) {
    const nucOk = activeNucleos.has(d.nucleo);
    d3.select(this).classed('hidden', !nucOk);
  });
  // Bases: visibilidade controlada pelo filtro de transporte
  d3.selectAll('.base-marker').each(function(d) {
    const transOk = activeTransport === 'all' || d[activeTransport] > 0;
    d3.select(this).classed('hidden', !transOk);
  });
}

// SVG
const mapArea = document.getElementById('map-area');
const svg = d3.select('#svg');
const tooltip = document.getElementById('tooltip');

const W = mapArea.clientWidth;
const H = mapArea.clientHeight;

const lonExt = d3.extent(data, d => d.lon);
const latExt = d3.extent(data, d => d.lat);
const pad = 50;

const xScale = d3.scaleLinear().domain(lonExt).range([pad, W - pad]);
const yScale = d3.scaleLinear().domain(latExt).range([H - pad, pad]);
const rScale = d3.scaleSqrt().domain(d3.extent(data, d => d.area)).range([3.5, 15]);

// Grid
const gGrid = svg.append('g');
const lons = d3.range(Math.ceil(lonExt[0]*2)/2, lonExt[1], 0.5);
const lats = d3.range(Math.ceil(latExt[0]*2)/2, latExt[1], 0.5);

lons.forEach(lo => {
  gGrid.append('line').attr('class','grid-line')
    .attr('x1', xScale(lo)).attr('x2', xScale(lo))
    .attr('y1', pad).attr('y2', H - pad);
  gGrid.append('text').attr('class','axis-label')
    .attr('x', xScale(lo)).attr('y', H - pad + 12)
    .attr('text-anchor','middle')
    .text(Math.abs(lo).toFixed(1)+'°W');
});
lats.forEach(la => {
  gGrid.append('line').attr('class','grid-line')
    .attr('y1', yScale(la)).attr('y2', yScale(la))
    .attr('x1', pad).attr('x2', W - pad);
  gGrid.append('text').attr('class','axis-label')
    .attr('x', pad - 4).attr('y', yScale(la) + 3)
    .attr('text-anchor','end')
    .text(Math.abs(la).toFixed(1)+'°S');
});

// Zoom
const gMain = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.4, 25]).on('zoom', evt => {
  gMain.attr('transform', evt.transform);
  gGrid.attr('transform', evt.transform);
  // Labels das bases: só visíveis com zoom > 3
  const k = evt.transform.k;
  d3.selectAll('.base-label').attr('opacity', k > 3 ? 1 : 0);
});
svg.call(zoom);

document.getElementById('zoom-in').onclick  = () => svg.transition().duration(300).call(zoom.scaleBy, 1.5);
document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.67);
document.getElementById('zoom-reset').onclick = () => svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);

// Dots
const dots = gMain.selectAll('.dot')
  .data(data).enter().append('circle')
  .attr('class', 'dot')
  .attr('cx', d => xScale(d.lon))
  .attr('cy', d => yScale(d.lat))
  .attr('r',  d => rScale(d.area))
  .attr('fill', d => colorMap[d.nucleo])
  .attr('opacity', 0.8)
  .attr('stroke', '#fff')
  .attr('stroke-width', 1);

// Tooltip
dots.on('mousemove', function(event, d) {
    const rect = mapArea.getBoundingClientRect();
    let tx = event.clientX - rect.left + 14;
    let ty = event.clientY - rect.top - 10;
    if (tx + 230 > W) tx = event.clientX - rect.left - 230;

    tooltip.innerHTML = `
      <div class="tt-up">${d.up} · <span style="color:${colorMap[d.nucleo]};font-weight:700">${d.nucleo}</span></div>
      <div class="tt-title">${d.name}</div>
      <div class="tt-row"><span>Área</span><span>${d.area.toLocaleString('pt-BR',{maximumFractionDigits:1})} ha</span></div>
      <div class="tt-row"><span>Lon / Lat</span><span>${d.lon.toFixed(3)}, ${d.lat.toFixed(3)}</span></div>`;

    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
    tooltip.classList.add('visible');
    d3.select(this).attr('opacity', 1).attr('stroke-width', 2).attr('stroke', colorMap[d.nucleo]);
  })
  .on('mouseleave', function() {
    tooltip.classList.remove('visible');
    d3.select(this).attr('opacity', 0.8).attr('stroke-width', 1).attr('stroke', '#fff');
  });

    tooltip.style.top  = ty + 'px';
    tooltip.classList.add('visible');
    d3.select(this).attr('opacity', 1).attr('stroke', '#f0a500').attr('stroke-width', 2.5);
  })
  .on('mouseleave', function() {
    tooltip.classList.remove('visible');
    d3.select(this).attr('opacity', 0.95).attr('stroke', '#fff').attr('stroke-width', 1.5);
  });

// ── SIMULAÇÃO DE OCORRÊNCIA ──────────────────────────────────────────────────
const VEL = { aviao: 250, helicoptero: 160, caminhao: 70 };
const EMO = { aviao: '✈', helicoptero: '🚁', caminhao: '🚛' };
const EMO_LABEL = { aviao: 'Avião', helicoptero: 'Helicóptero', caminhao: 'Caminhão' };
const COR_RECURSO = { aviao: '#005a8e', helicoptero: '#c8372d', caminhao: '#e87722' };

let simAtiva = false;
let simTimers = [];
let fireUPsAtivos = [];

function haversineKm(lon1, lat1, lon2, lat2) {
  const R = 6371, toR = Math.PI/180;
  const dLat = (lat2-lat1)*toR, dLon = (lon2-lon1)*toR;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function showNotif(titulo, sub, tipo='fire') {
  const n = document.getElementById('notificacao');
  n.className = 'notificacao ' + tipo;
  n.querySelector('.notif-title').textContent = titulo;
  n.querySelector('.notif-sub').textContent   = sub;
  n.classList.add('visible');
  setTimeout(() => n.classList.remove('visible'), 3500);
}

function atualizarPainel(dispatches) {
  const panel = document.getElementById('ocorrencia-panel');
  const content = document.getElementById('oc-content');
  if (!dispatches || dispatches.length === 0) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');
  content.innerHTML = dispatches.map(d =>
    `<div class="oc-row"><span>${EMO[d.tipo]} ${EMO_LABEL[d.tipo]}</span><span id="eta-${d.id}">ETA ${d.eta}min</span></div>`
  ).join('') +
  `<div class="oc-row" style="margin-top:6px"><span>UPs afetadas</span><span>${fireUPsAtivos.length}</span></div>`;
}

function iniciarSimulacao() {
  simAtiva = true;
  const btn = document.getElementById('btn-play');
  btn.textContent = '■';
  btn.classList.add('active');

  showNotif('🔥 NOVA OCORRÊNCIA INICIADA', 'Incêndio detectado — despachando recursos');

  // Selecionar 3-5 UPs aleatórias visíveis
  const candidates = data.filter(d => activeNucleos.has(d.nucleo));
  const shuffled = [...candidates].sort(() => Math.random() - 0.5);
  fireUPsAtivos = shuffled.slice(0, 3 + Math.floor(Math.random() * 3));

  // Grupo do fogo
  const fireGrp = gMain.append('g').attr('class', 'fire-group');

  fireUPsAtivos.forEach(up => {
    const cx = xScale(up.lon), cy = yScale(up.lat);
    const r  = rScale(up.area);

    // Ondas de pulso em camadas
    [0, 400, 800].forEach(delay => {
      const ring = fireGrp.append('circle')
        .attr('cx', cx).attr('cy', cy).attr('r', r + 2)
        .attr('fill', 'none').attr('stroke', '#c8372d')
        .attr('stroke-width', 1.5).attr('opacity', 0.9);
      function pulsarRing() {
        ring.interrupt();
        ring.attr('r', r+2).attr('opacity', 0.9)
          .transition().delay(delay % 400).duration(1000)
          .attr('r', r + 22).attr('opacity', 0)
          .on('end', () => { if(simAtiva) pulsarRing(); });
      }
      pulsarRing();
    });

    // Círculo vermelho sólido sobre a UP
    fireGrp.append('circle')
      .attr('class', 'fire-dot-' + up.up)
      .attr('cx', cx).attr('cy', cy).attr('r', r)
      .attr('fill', '#c8372d').attr('opacity', 0.92)
      .attr('stroke', '#fff').attr('stroke-width', 1);

    // Emoji fogo
    fireGrp.append('text')
      .attr('x', cx).attr('y', cy - r - 5)
      .attr('text-anchor','middle').attr('font-size','13px')
      .attr('pointer-events','none').text('🔥');
  });

  // Despachar recursos após 2s
  const dispatchList = [];
  let dispId = 0;

  setTimeout(() => {
    const dispGrp = gMain.append('g').attr('class', 'dispatch-group');

    fireUPsAtivos.forEach((up, fi) => {
      // Escolher base mais próxima com recurso disponível
      const tipos = ['aviao','helicoptero','caminhao'];
      const numR = 1 + (fi % 2); // 1 ou 2 recursos por UP

      for (let ri = 0; ri < numR; ri++) {
        const tipo = tipos[(fi + ri) % tipos.length];
        const basesComTipo = basesData.filter(b => b[tipo] > 0);
        if (!basesComTipo.length) continue;

        // Base mais próxima
        const base = basesComTipo.reduce((best, b) => {
          const d = haversineKm(b.lon, b.lat, up.lon, up.lat);
          return d < best.dist ? {b, dist:d} : best;
        }, {b: basesComTipo[0], dist:Infinity}).b;

        const distKm = haversineKm(base.lon, base.lat, up.lon, up.lat);
        const etaMin = Math.max(1, Math.round(distKm / VEL[tipo] * 60));
        const durMs  = 22000 + ri * 3000 + fi * 1500; // duração visual

        const id = dispId++;
        dispatchList.push({ id, tipo, eta: etaMin, base: base.up, alvo: up.up });
        atualizarPainel(dispatchList);

        animarRecurso(dispGrp, base, up, tipo, id, etaMin, durMs, dispatchList);
      }
    });
  }, 2000);
}

function animarRecurso(grp, base, upAlvo, tipo, id, etaMin, durMs, dispList) {
  const x1 = xScale(base.lon), y1 = yScale(base.lat);
  const x2 = xScale(upAlvo.lon), y2 = yScale(upAlvo.lat);
  const cor = COR_RECURSO[tipo];

  // Linha tracejada (marching ants)
  const linha = grp.append('line')
    .attr('class', 'dispatch-line')
    .attr('x1', x1).attr('y1', y1)
    .attr('x2', x1).attr('y2', y1)   // começa no ponto de origem
    .attr('stroke', cor)
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '6 6')
    .attr('opacity', 0.7);

  // Animar extensão da linha nos primeiros 20% do tempo
  linha.transition().duration(durMs * 0.2)
    .attr('x2', x2).attr('y2', y2);

  // Grupo do ícone móvel
  const iconGrp = grp.append('g').attr('class', 'recurso-mov').attr('opacity', 0);

  // Emoji ícone
  iconGrp.append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-size','16px').attr('y', 1).attr('filter','drop-shadow(0 1px 2px rgba(0,0,0,0.6))').text(EMO[tipo]);

  // ETA label (acima)
  const etaTxt = iconGrp.append('text')
    .attr('id', 'moving-eta-' + id)
    .attr('text-anchor','middle')
    .attr('font-size','8px').attr('font-weight','700')
    .attr('font-family','Inter,sans-serif')
    .attr('fill', cor).attr('y', -18)
    .text('ETA ' + etaMin + 'min');

  // Velocidade (abaixo)
  iconGrp.append('text')
    .attr('text-anchor','middle')
    .attr('font-size','8px').attr('font-family','Inter,sans-serif')
    .attr('fill','rgba(255,255,255,0.7)').attr('y', 24)
    .text(VEL[tipo] + ' km/h');

  // Animar movimento com d3.timer
  const startTime = performance.now();
  iconGrp.transition().duration(300).attr('opacity', 1);

  const timer = d3.timer(elapsed => {
    const progress = Math.min(elapsed / durMs, 1);
    const cx = x1 + (x2 - x1) * progress;
    const cy = y1 + (y2 - y1) * progress;
    iconGrp.attr('transform', `translate(${cx},${cy})`);

    // Atualizar ETA no ícone e no painel
    const etaAtual = Math.max(0, Math.round(etaMin * (1 - progress)));
    etaTxt.text(etaAtual > 0 ? 'ETA ' + etaAtual + 'min' : 'Chegando...');
    const panelEta = document.getElementById('eta-' + id);
    if (panelEta) panelEta.textContent = etaAtual > 0 ? 'ETA ' + etaAtual + 'min' : '✓ Chegou';

    if (progress >= 1) {
      timer.stop();
      // Flash verde na UP (extinto)
      grp.selectAll('.fire-dot-' + upAlvo.up)
        .transition().duration(200).attr('fill','#8dc63f')
        .transition().delay(800).duration(400).attr('opacity',0).remove();
      // Fade out dos elementos
      iconGrp.transition().duration(600).attr('opacity',0).remove();
      linha.transition().duration(600).attr('opacity',0).remove();

      // Verificar se todos chegaram
      const allDone = dispList.every(d => {
        const el = document.getElementById('eta-' + d.id);
        return !el || el.textContent === '✓ Chegou';
      });
      if (allDone) {
        setTimeout(() => {
          showNotif('✅ OCORRÊNCIA CONTROLADA', 'Todos os recursos chegaram ao destino', 'ok');
          setTimeout(encerrarSimulacao, 3500);
        }, 800);
      }
    }
  });
  simTimers.push(timer);
}

function encerrarSimulacao() {
  simAtiva = false;
  simTimers.forEach(t => t.stop());
  simTimers = [];
  fireUPsAtivos = [];

  d3.selectAll('.fire-group').remove();
  d3.selectAll('.dispatch-group').remove();

  document.getElementById('ocorrencia-panel').classList.remove('visible');

  const btn = document.getElementById('btn-play');
  btn.textContent = '▶';
  btn.classList.remove('active');
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (simAtiva) encerrarSimulacao();
  else iniciarSimulacao();
});

</script>
